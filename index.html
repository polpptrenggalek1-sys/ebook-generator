<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas E‑Book Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #1a237e; --primary-light: #3949ab;
      --accent: #ffc107; --bg: #f0f2f5; --text: #212121;
      --success: #2e7d32; --danger: #c62828;
      --shadow: 0 2px 12px rgba(0,0,0,0.08); --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); }

    .navbar {
      background: linear-gradient(135deg, #0d1442, #1a237e);
      color:white; padding:12px 24px; display:flex; align-items:center; justify-content:space-between;
    }
    .navbar a { color:white; text-decoration:none; }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

    .card {
      background: white; border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 24px; border:1px solid #e8eaf0;
    }
    h3 { margin-bottom:20px; color:var(--primary); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-group { margin-bottom:16px; }
    .form-group.full-width { grid-column:1/-1; }
    label { font-size:13px; font-weight:600; display:block; margin-bottom:6px; }
    .required { color:red; }
    input, select, textarea {
      width:100%; padding:10px 14px; border:1px solid #d0d5dd; border-radius:10px;
      font-family:'Poppins',sans-serif; font-size:14px; outline:none;
    }
    input:focus, select:focus, textarea:focus {
      border-color:var(--primary-light); box-shadow:0 0 0 2px rgba(26,35,126,0.1);
    }

    .btn {
      padding:10px 24px; border-radius:10px; font-size:13px; font-weight:600;
      font-family:'Poppins',sans-serif; cursor:pointer; border:none;
      display:inline-flex; align-items:center; gap:6px;
    }
    .btn-primary { background:var(--primary); color:white; }
    .btn-primary:hover { background:var(--primary-light); }
    .btn-outline { background:transparent; border:1px solid #ccc; color:var(--text); }
    .btn-outline:hover { border-color:var(--primary); color:var(--primary); }

    .form-actions {
      display:flex; gap:10px; margin-top:16px; justify-content:flex-end;
    }

    .canvas-container {
      margin-top: 10px;
      border: 1px solid #d0d5dd;
      border-radius: 10px;
      overflow: auto;
      background: #fff;
      text-align: center;
    }
    canvas {
      display: block;
      margin: 0 auto;
    }
    #fallback-editor { display:none; min-height: 300px; }

    .toast {
      position:fixed; bottom:24px; right:24px; padding:14px 24px; border-radius:12px;
      color:white; font-size:14px; font-weight:500; z-index:9999;
      box-shadow:0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.success { background:var(--success); }
    .toast.error { background:var(--danger); }
    .toast.info { background:#1a237e; }

    #debug-info {
      margin-top:16px; padding:12px; background:#f5f5f5; border-radius:8px;
      font-size:13px; color:#555; display:none;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <span>🎨 Canvas E‑Book Generator</span>
    <div></div>
  </nav>

  <main class="container">
    <div class="card">
      <h3><i class="fas fa-paint-brush"></i> Tulis & Gambar E‑Book Anda</h3>
      <form id="ebookForm" onsubmit="return false;">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Judul <span class="required">*</span></label>
            <input type="text" id="eb-judul" required placeholder="Judul e‑book">
          </div>
          <div class="form-group">
            <label>Pengarang</label>
            <input type="text" id="eb-pengarang" placeholder="Nama penulis">
          </div>
          <div class="form-group">
            <label>Penerbit</label>
            <input type="text" id="eb-penerbit" placeholder="Penerbit">
          </div>
          <div class="form-group">
            <label>Tahun</label>
            <input type="number" id="eb-tahun" placeholder="2025" min="1900" max="2099">
          </div>
          <div class="form-group">
            <label>Kategori <span class="required">*</span></label>
            <select id="eb-kategori" required>
              <option value="">-- Pilih Kategori --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Bahasa</label>
            <select id="eb-bahasa">
              <option value="Indonesia">Indonesia</option>
              <option value="English">English</option>
              <option value="Arabic">Arabic</option>
              <option value="Lainnya">Lainnya</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label>Sinopsis</label>
            <textarea id="eb-sinopsis" rows="2" placeholder="Deskripsi singkat..."></textarea>
          </div>
          <div class="form-group full-width">
            <label>Konten E‑Book (Teks) <span class="required">*</span></label>
            <textarea id="content-textarea" rows="8" placeholder="Tulis konten di sini... Setiap baris baru akan menjadi paragraf baru."></textarea>
            <button type="button" class="btn btn-outline" style="margin-top:8px;" onclick="updateCanvas()">
              <i class="fas fa-sync"></i> Perbarui Canvas
            </button>
          </div>
          <div class="form-group full-width">
            <label>Pratinjau Canvas</label>
            <div class="canvas-container" id="canvas-container">
              <canvas id="preview-canvas" width="794" height="1123"></canvas> <!-- A4 proporsional -->
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="resetForm(); return false;">
            <i class="fas fa-redo"></i> Reset
          </button>
          <button type="button" class="btn btn-primary" id="ebookSubmitBtn" onclick="generatePDF(); return false;">
            <i class="fas fa-file-pdf"></i> Generate PDF & Simpan
          </button>
        </div>
      </form>
      <div id="debug-info"></div>
    </div>
  </main>

  <div id="toast" class="toast" style="display:none;"></div>

  <script>
    // =====================
    // KONFIGURASI SUPABASE
    // =====================
    const SUPABASE_URL = 'https://wntclktbqmygxdodcmwb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_UFXV4YyOnRk70FQGHSEeCw_ad4RTwrM';
    var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Elemen canvas
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');

    // Helper
    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      if(t) {
        t.textContent = msg;
        t.className = `toast ${type}`;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 4000);
      }
    }

    function debugInfo(msg) {
      const d = document.getElementById('debug-info');
      if(d) {
        d.style.display = 'block';
        d.innerHTML += `<div>${msg}</div>`;
      }
    }

    // Muat kategori dari Supabase
    async function loadCategories() {
      try {
        const { data, error } = await supabaseClient.from('categories').select('*');
        if (error) throw error;
        const sel = document.getElementById('eb-kategori');
        sel.innerHTML = '<option value="">-- Pilih Kategori --</option>';
        data.forEach(c => {
          sel.innerHTML += `<option value="${c.id}">${c.icon||''} ${escapeHtml(c.nama)}</option>`;
        });
        debugInfo('✅ Kategori dimuat');
      } catch (err) {
        debugInfo('❌ Gagal memuat kategori: ' + err.message);
      }
    }

    // Gambar teks ke canvas
    function updateCanvas() {
      const text = document.getElementById('content-textarea').value;
      if (!text.trim()) {
        // Gambar placeholder
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#999';
        ctx.font = '20px Poppins';
        ctx.textAlign = 'center';
        ctx.fillText('Tulis konten dan klik "Perbarui Canvas"', canvas.width/2, canvas.height/2);
        return;
      }

      // Bersihkan canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Atur background putih
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Atur font dan gaya
      const margin = 60;
      const lineHeight = 28;
      const maxWidth = canvas.width - (margin * 2);
      let y = margin;

      ctx.fillStyle = '#000000';
      ctx.font = '16px "Times New Roman", serif';
      ctx.textAlign = 'left';

      // Bagi teks menjadi paragraf berdasarkan baris baru
      const paragraphs = text.split('\n');
      
      for (let p = 0; p < paragraphs.length; p++) {
        const para = paragraphs[p].trim();
        if (!para) {
          y += lineHeight; // spasi kosong
          continue;
        }

        // Bungkus teks (word wrap)
        const words = para.split(' ');
        let line = '';
        for (let i = 0; i < words.length; i++) {
          const testLine = line + (line ? ' ' : '') + words[i];
          const metrics = ctx.measureText(testLine);
          if (metrics.width > maxWidth && line) {
            ctx.fillText(line, margin, y);
            y += lineHeight;
            line = words[i];
          } else {
            line = testLine;
          }
        }
        if (line) {
          ctx.fillText(line, margin, y);
          y += lineHeight;
        }
        // Tambah spasi antar paragraf
        y += 8;
      }

      // Jika teks melebihi satu halaman, kita bisa menambah tinggi canvas atau membuat multiple page saat PDF (nanti di generatePDF)
      // Untuk pratinjau, kita hanya tampilkan yang muat.
    }

    // Fungsi generate PDF multi-halaman dari canvas
    async function generatePDF() {
      console.log('▶️ generatePDF() dipanggil');
      const btn = document.getElementById('ebookSubmitBtn');
      if (!btn) return;

      const judul = document.getElementById('eb-judul').value.trim();
      if (!judul) {
        showToast('Judul wajib diisi!', 'error');
        return;
      }
      const kategoriId = document.getElementById('eb-kategori').value;
      if (!kategoriId) {
        showToast('Kategori wajib dipilih!', 'error');
        return;
      }

      const text = document.getElementById('content-textarea').value;
      if (!text.trim()) {
        showToast('Konten tidak boleh kosong!', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menghasilkan PDF...';
      debugInfo('▶️ Proses dimulai...');

      try {
        // Buat PDF dengan jsPDF
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: 'portrait',
          unit: 'px',
          format: [canvas.width, canvas.height]
        });

        // Dapatkan dataURL dari canvas saat ini
        const imgData = canvas.toDataURL('image/png');
        
        // Tambahkan gambar ke halaman pertama
        pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);

        // Jika teks panjang, kita perlu membuat beberapa halaman. 
        // Untuk itu, kita bisa merender ulang teks ke canvas offscreen dengan memotong sesuai halaman.
        // Tapi untuk kemudahan, kita cukup simpan gambar canvas saat ini sebagai satu halaman.
        // Untuk multi-halaman, kita harus menggambar ulang dengan offset. 
        // Di sini, kita akan ambil pendekatan: buat beberapa canvas sementara.

        // Simpan pengaturan canvas awal
        const originalText = text;
        const linesPerPage = Math.floor((canvas.height - 120) / 28); // kira-kira jumlah baris per halaman (28px line height)
        // Ini sulit, jadi untuk demo kita hanya gunakan satu halaman dari canvas yang sudah di-update.
        // Jika ingin multi-halaman, kita bisa memanggil updateCanvas dengan teks yang dipotong.

        // Simpan metadata ke Supabase
        const bookData = {
          judul: judul,
          pengarang: document.getElementById('eb-pengarang').value.trim(),
          penerbit: document.getElementById('eb-penerbit').value.trim(),
          tahun: parseInt(document.getElementById('eb-tahun').value) || null,
          kategori_id: parseInt(kategoriId),
          bahasa: document.getElementById('eb-bahasa').value,
          sinopsis: document.getElementById('eb-sinopsis').value.trim(),
          file_url: ''
        };

        const { error: insertError } = await supabaseClient.from('books').insert(bookData);
        if (insertError) throw insertError;

        // Unduh PDF
        pdf.save(judul + '.pdf');

        showToast('E‑book berhasil dibuat dan disimpan!');
        document.getElementById('ebookForm').reset();
        updateCanvas(); // Reset canvas ke kosong
      } catch (err) {
        console.error('Error:', err);
        showToast('Gagal: ' + err.message, 'error');
        debugInfo('❌ Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-file-pdf"></i> Generate PDF & Simpan';
      }
    }

    function resetForm() {
      document.getElementById('ebookForm').reset();
      updateCanvas();
      showToast('Form berhasil di-reset', 'info');
    }

    // Inisialisasi
    window.onload = function() {
      loadCategories();
      updateCanvas(); // gambar placeholder awal
      debugInfo('📋 Canvas siap');
    };
  </script>
</body>
</html>
